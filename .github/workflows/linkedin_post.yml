name: LinkedIn Daily Auto-Post

on:
  # cron-job.org (external, reliable) triggers this at exactly 8:30 AM IST every day
  # These internal crons are just emergency backup only
  schedule:
    - cron: '0 3 * * *'   # 8:30 AM IST = 3:00 AM UTC (backup only)

  # Manual trigger from GitHub website (useful from phone)
  workflow_dispatch:

jobs:
  post-to-linkedin:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 📤 Post to LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: node linkedin_github_post.js

      - name: 💾 Commit Updated Post Status
        run: |
          git config --global user.name  "LinkedIn Campaign Bot"
          git config --global user.email "campaign-bot@github-actions.com"
          git add linkedin_posts.json campaign_log.txt
          git diff --staged --quiet || git commit -m "✅ Day posted — $(date '+%Y-%m-%d %H:%M UTC')"
          git push || true
